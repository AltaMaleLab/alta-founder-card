<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALTA Founder Card</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FFFFFF; font-family: 'Georgia', serif; }

  .card-page {
    width: 1050px;
    height: 600px;
    background-color: #000000;
    position: relative;
    overflow: hidden;
  }

  .front .kicker-no {
    position: absolute;
    left: 80px;
    top: 70px;
    font-family: Georgia, serif;
    font-size: 16px;
    letter-spacing: 2.4px;
    color: #C8B568;
  }

  .front .kicker-tag {
    position: absolute;
    right: 80px;
    top: 70px;
    font-family: Georgia, serif;
    font-size: 16px;
    letter-spacing: 1.6px;
    color: #5C5C5C;
  }

  .front .rule-top {
    position: absolute;
    left: 80px;
    top: 102px;
    width: 890px;
    height: 1px;
    background-color: #2A2A2A;
  }

  .front .wordmark {
    position: absolute;
    left: 80px;
    top: 128px;
    font-family: Georgia, serif;
    font-size: 21px;
    letter-spacing: 4px;
    color: #8A8A8A;
  }

  .front .name {
    position: absolute;
    left: 80px;
    top: 195px;
    font-family: 'Poppins', Helvetica, Arial, sans-serif;
    font-weight: 500;
    font-size: 52px;
    color: #FFFFFF;
  }

  .front .rule-name {
    position: absolute;
    left: 80px;
    top: 278px;
    width: 100px;
    height: 2px;
    background-color: #C8B568;
  }

  .front .identity-line1 {
    position: absolute;
    left: 80px;
    top: 315px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 23px;
    color: #B8B8B8;
  }

  .front .identity-line2 {
    position: absolute;
    left: 80px;
    top: 352px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 23px;
    color: #B8B8B8;
  }

  .front .url {
    position: absolute;
    left: 80px;
    top: 530px;
    font-family: 'Lato', Helvetica, Arial, sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 2px;
    color: #4A4A4A;
  }

  .back .kicker-note {
    position: absolute;
    left: 80px;
    top: 70px;
    font-family: Georgia, serif;
    font-size: 16px;
    letter-spacing: 2.4px;
    color: #C8B568;
  }

  .back .rule-top {
    position: absolute;
    left: 80px;
    top: 102px;
    width: 890px;
    height: 1px;
    background-color: #2A2A2A;
  }

  .back .quote-line1 {
    position: absolute;
    left: 80px;
    top: 178px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 27px;
    color: #EDEDED;
  }

  .back .quote-line2 {
    position: absolute;
    left: 80px;
    top: 222px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 27px;
    color: #EDEDED;
  }

  .back .quote-line3 {
    position: absolute;
    left: 80px;
    top: 266px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 27px;
    color: #EDEDED;
  }

  .back .rule-quote {
    position: absolute;
    left: 80px;
    top: 330px;
    width: 76px;
    height: 1px;
    background-color: #2A2A2A;
  }

  .back .signature {
    position: absolute;
    left: 80px;
    top: 366px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 20px;
    color: #C8B568;
  }
</style>
</head>
<body>

  <div class="card-page front" data-document-role="page" data-label="ALTA Founder Card — Front">
    <div class="kicker-no">No. 01</div>
    <div class="kicker-tag">THE LONG GAME FOR MEN 40+</div>
    <div class="rule-top"></div>
    <div class="wordmark">ALTA MALE LAB</div>
    <div class="name">Anthony Kvaternik</div>
    <div class="rule-name"></div>
    <div class="identity-line1">Perspective Creator for</div>
    <div class="identity-line2">the Second Half of Life.</div>
    <div class="url">ALTAMALELAB.COM</div>
  </div>

  <div class="card-page back" data-document-role="page" data-label="ALTA Founder Card — Back">
    <div class="kicker-note">FOUNDER'S NOTE</div>
    <div class="rule-top"></div>
    <div class="quote-line1">Helping men 40+ see their</div>
    <div class="quote-line2">bodies, their health and their</div>
    <div class="quote-line3">future differently.</div>
    <div class="rule-quote"></div>
    <div class="signature">Play the Long Game.</div>
  </div>

</body>
</html>
